<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeAI — Payment Successful</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#0a0a0a;--cream:#f5f0e8;--gold:#c9a84c;--gray:#6b6b6b;--border:#2a2a2a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--black);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#111;border:1px solid var(--gold);padding:56px;max-width:480px;width:100%;text-align:center;animation:fadeUp .6s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .icon{font-size:48px;margin-bottom:24px}
  h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:12px}
  .sub{color:var(--gray);font-size:14px;line-height:1.6;margin-bottom:32px}
  .btn{display:block;width:100%;background:var(--gold);color:var(--black);border:none;padding:18px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:opacity .3s;margin-bottom:0}
  .btn:hover{opacity:.85}
  .guarantee{font-size:12px;color:#333;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✦</div>
  <h1>Payment Confirmed!</h1>
  <p class="sub">Your purchase is complete. Click below to access ResumeAI Premium. You can always log in again with the email you used to purchase.</p>
  <a class="btn" href="/premium.html">Open Resume Builder →</a>
  <div class="guarantee">✓ Log in anytime with your purchase email · Lifetime access</div>
</div>
</body>
</html>
